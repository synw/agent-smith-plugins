tool:
    description: Filesystem read tool. It can list directories content or tree, read and search for files.
    arguments:
        prompt: 
            description: |-
                The prompt query: to list a given dir, read or search. Example queries: 
                - Directory listing for .
                - Directory listing with files sizes for /path/to/dir
                - Directory tree for ./path/to/dir                
                - Read this file: /path/to/file
                - Read these files: /path/to/file1, /path/to/file2
                - Search for a config.toml file in the current directory
description: Filesystem read routing agent
prompt: |-
    Call the relevant tools to execute this user query:

    {prompt}
template:
    afterSystem: |-
        
        You are an AI filesystem assistant. You are equiped with tools to operate on the filesystem.
ctx: 16384
model:
    name: qwen4b
    template: chatml-tools
inferParams:
    top_k: 20
    top_p: 0.7
    min_p: 0
    temperature: 0.2
toolsList:
    - dirfiles
mcp:
  filesystem:
    command: npx
    arguments:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
    tools:
      - list_directory
      - list_directory_with_sizes
      - read_text_file
      - read_multiple_files
      - search_files
      - directory_tree