name: commit_details
description: Create a commit message from a git diff
type: terminal
prompt: |-
      Create the details of a commit message. Here is the first line describing the purpose of the commit:

      ```
      {msg}
      ```

      Here is the git diff

      ```
      {prompt}
      ```

      {file:../fragments/commit_msg_firstline.md}

      You analyze the git diff, summarize and prioritize the changes, classify by theme and importance.
      {instructions}
template: 
    system: |- 
        You are an AI programmer assistant. Your task is to write the details of a commit message from a git diff and a 
        user provided first line describing the purpose of the commit.
model: glmflash
inferParams:
    top_p: 1
    top_k: 0
    min_p: 0.01
    temperature: 0.2
    repeat_penalty: 1
variables:
    required:
        msg:
            description: The first line of the commit message
    optional:
        instructions:
            description: Optional additional instructions