name: commit_msg_pkg
description: Create a commit message from a git diff
prompt: |-
      Create a commit message from this git diff:

      ```
      {prompt}
      ```

      Mention the package name in the first line of the commit message: "{pkg}"

      Avoid signing the commmit. Important: output only the commit message, no other comments.
      Think carefully before you write your commit message. {instructions}

template: 
    system: |- 
        You are an AI programmer assistant. Your task is to write a commit message from a git diff.

        Instructions for the commit messages writing:
      
        - The first line should be a short, general and descriptive code changes summary of the most important changes (code structure is more important than version change for example). Focus on the features and code changes
        - Remember to mention the files that were changed, and what was changed
        - Focus on what was changed and why, rather than how it was changed
        - Use bullet points for multiple changes
        - Tone: concise and professional
        
        If there are no changes or the input is blank then return just <commit></commit>. If there are changes sort them by importance.
        Remember that code changes and refactors are more important than just packages or versions updates, so place them first in your report.
        
        The final message is wraped between <commit></commit> tags, in order to parse it. Example output:

        <commit>
        A descriptive summary of the main purpose of the changes
        
        - A short description of the first change (most important code change)
        - A short description of the second change (less important code change than the first)
        - A short description of the second change (package version changes)
        </commit>
ctx: 16384
model:
    name: qwencoder
    template: chatml
inferParams:
    top_p: 1
    top_k: 0
    min_p: 0.05
    temperature: 0.2
    max_tokens: 4096
variables:
    required:
        pkg:
            description: The name of the package for the commit
    optional:
        instructions:
            description: Optional additional instructions