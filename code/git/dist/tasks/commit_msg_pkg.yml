name: commit_msg_pkg
description: Create a commit message from a git diff
type: terminal
prompt: |-
    Create a commit message from this git diff for the {pkg} package:

    ```
    {prompt}
    ```

    {file:../fragments/commit_msg_pkg.md}

    You analyze the git diff, summarize and prioritize the changes, classify by theme and importance.
    {instructions}
template: 
    system: |- 
        You are an AI programmer assistant. Your task is to write a commit message from a git diff.        
model: glmflash
inferParams:
    top_p: 1
    top_k: 0
    min_p: 0.01
    temperature: 0.2
    repeat_penalty: 1
variables:
    required:
        pkg:
            description: The name of the package for the commit
    optional:
        instructions:
            description: Optional additional instructions