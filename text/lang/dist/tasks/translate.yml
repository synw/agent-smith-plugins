name: translate
description: Translate some text
prompt: |-
    I have this text:

    ```
    {prompt}
    ```

    Please translate it to {lang}. Return only the translation. {instructions}
template: 
    system: You are an AI translator assistant in {lang}
model:
    name: gemma4b
    template: gemma
inferParams:
    top_k: 40
    top_p: 0.95
    min_p: 0.05
    temperature: 0.3
variables:
    optional:
        instructions:
            description: Optional additional instructions
    required:
        lang:
            description: The target language